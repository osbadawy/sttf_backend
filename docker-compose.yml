services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '127.0.0.1:${APP_PORT:-5000}:5000'
      - '127.0.0.1:9229:9229'  # Debug port
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${APP_PORT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      WEB_FRONTEND_URL: ${WEB_FRONTEND_URL}
      MOBILE_FRONTEND_URL: ${MOBILE_FRONTEND_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      WHOOP_AUTHORIZE_URL: ${WHOOP_AUTHORIZE_URL}
      WHOOP_TOKEN_URL: ${WHOOP_TOKEN_URL}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      # Source code volumes for hot-reload in development
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
      - ./tsconfig.build.json:/app/tsconfig.build.json

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
