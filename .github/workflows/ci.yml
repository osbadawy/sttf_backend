name: CI - Docker Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Export environment variables
        run: |
          echo "POSTGRES_DB=${{ vars.POSTGRES_DB }}" >> $GITHUB_ENV
          echo "POSTGRES_USER=${{ vars.POSTGRES_USER }}" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=${{ vars.POSTGRES_PASSWORD }}" >> $GITHUB_ENV
          echo "POSTGRES_PORT=${{ vars.POSTGRES_PORT }}" >> $GITHUB_ENV
          echo "NODE_ENV=${{ vars.NODE_ENV }}" >> $GITHUB_ENV
          echo "APP_PORT=${{ vars.APP_PORT }}" >> $GITHUB_ENV
          echo "SENTRY_DSN=${{ vars.SENTRY_DSN }}" >> $GITHUB_ENV
        
      - name: Verify environment variables
        run: |
          echo "POSTGRES_DB: $POSTGRES_DB"
          echo "POSTGRES_USER: $POSTGRES_USER"
          echo "POSTGRES_PASSWORD: $POSTGRES_PASSWORD"
          echo "POSTGRES_PORT: $POSTGRES_PORT"
          echo "NODE_ENV: $NODE_ENV"
          echo "APP_PORT: $APP_PORT"
          echo "SENTRY_DSN: $SENTRY_DSN
        
      - name: Build and start services
        run: docker compose up --build -d
        
      - name: Wait for services to be ready
        run: sleep 10
        
      - name: Run tests
        run: docker compose run --rm app npm test
        
      - name: Stop services
        run: docker compose down
        