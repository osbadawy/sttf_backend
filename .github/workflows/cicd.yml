name: CICD Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  format--and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Prettier Check
        run: npm run format:check
        env:
          CI: true
        
      - name: Run ESLint
        run: npm run lint
        env:
          CI: true

  build-and-test:
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Export environment variables
        run: |
          echo "POSTGRES_DB=${{ vars.POSTGRES_DB }}" >> $GITHUB_ENV
          echo "POSTGRES_USER=${{ vars.POSTGRES_USER }}" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=${{ vars.POSTGRES_PASSWORD }}" >> $GITHUB_ENV
          echo "POSTGRES_PORT=${{ vars.POSTGRES_PORT }}" >> $GITHUB_ENV
          echo "NODE_ENV=${{ vars.NODE_ENV }}" >> $GITHUB_ENV
          echo "APP_PORT=${{ vars.APP_PORT }}" >> $GITHUB_ENV
          echo "SENTRY_DSN=${{ vars.SENTRY_DSN }}" >> $GITHUB_ENV
        
      - name: Verify environment variables
        run: |
          echo "POSTGRES_DB: $POSTGRES_DB"
          echo "POSTGRES_USER: $POSTGRES_USER"
          echo "POSTGRES_PASSWORD: $POSTGRES_PASSWORD"
          echo "POSTGRES_PORT: $POSTGRES_PORT"
          echo "NODE_ENV: $NODE_ENV"
          echo "APP_PORT: $APP_PORT"
          echo "SENTRY_DSN: $SENTRY_DSN"
        
      - name: Build and start services
        run: docker compose up --build -d
        
      - name: Wait for services to be ready
        run: sleep 10
        
      - name: Run tests
        run: docker compose run --rm app npm test
        
      - name: Stop services
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    environment: deploy
    needs: [format--and-lint, build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    env:
      AWS_REGION: eu-central-1
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment context
        id: set-context
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "tags=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "tags=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT
            echo "prod-tag=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:prod" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.deploy
          push: true
          tags: |
            ${{ steps.set-context.outputs.tags }}
            ${{ steps.set-context.outputs.prod-tag }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image details
        run: |
          echo "${{ steps.set-context.outputs.environment }} image(s) pushed:"
          echo "${{ steps.set-context.outputs.tags }}"
          if [[ -n "${{ steps.set-context.outputs.prod-tag }}" ]]; then
            echo "${{ steps.set-context.outputs.prod-tag }}"
          fi
        